<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Contact form</title>

    <link rel="stylesheet" href="./styles.css" />

    <script defer src="./main.js"></script>
  </head>
  <body>
    <main class="card">
      <h1 class="card__title">Contact Us</h1>

      <form class="card__form">
        <div class="card__field">
          <label for="first-name"
            >First Name <span class="required">*</span></label
          >

          <input
            class="card__field-input"
            type="text"
            id="first-name"
            name="first-name"
            required
          />
        </div>

        <div class="card__field">
          <label for="last-name"
            >Last Name <span class="required">*</span></label
          >

          <input
            class="card__field-input"
            type="text"
            id="last-name"
            name="last-name"
            required
          />
        </div>

        <div class="card__field card__field-email">
          <label for="email"
            >Email Address <span class="required">*</span></label
          >

          <input
            class="card__field-input"
            type="email"
            id="email"
            name="email"
            required
            autocomplete="email"
          />
        </div>

        <fieldset class="card__contact-method">
          <legend class="card__contact-method-legend">
            Query Type <span class="required">*</span>
          </legend>

          <div class="card__field-input">
            <input
              type="radio"
              id="general"
              name="query-type"
              value="general"
            />

            <label for="general">General Enquiry</label>
          </div>

          <div class="card__field-input card__field-input-support">
            <input
              type="radio"
              id="support"
              name="query-type"
              value="support"
            />

            <label for="support">Support Request</label>
          </div>
        </fieldset>

        <div class="card__field-textarea">
          <div class="card__field">
            <label for="message">Message <span class="required">*</span></label>

            <textarea
              class="card__field-texta"
              id="message"
              name="message"
              rows="5"
              required
            ></textarea>
          </div>

          <div class="card__field-consent">
            <input
              class="card__field-checkbox"
              type="checkbox"
              id="consent"
              name="consent"
              required
            />

            <label for="consent"
              >I consent to being contacted by the team
              <span class="required">*</span></label
            >
          </div>

          <button class="card__submit-button" type="submit">Submit</button>
        </div>
      </form>
    </main>

    <footer class="attribution">
      <p>
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a
        >. Coded by <a href="#">Julio Anccasi</a>.
      </p>
    </footer>
  </body>
</html>
